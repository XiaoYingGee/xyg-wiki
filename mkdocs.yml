site_name: XYG Wiki
site_url: https://xiaoyinggee.github.io/xyg-wiki/
site_description: XiaoYingGee's personal wiki & knowledge base
site_author: XiaoYingGee
repo_name: XiaoYingGee/xyg-wiki
repo_url: https://github.com/XiaoYingGee/xyg-wiki

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            首页: Home
            OpenClaw: OpenClaw
            Copilot Gateway: Copilot Gateway
            模型配置与 Prompt Caching: Model Config & Prompt Caching
            介绍: Introduction
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - Copilot Gateway:
      - 介绍: copilot-gateway/introduction.md
  - OpenClaw:
      - 模型配置与 Prompt Caching: openclaw/model-and-prompt-caching.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/XiaoYingGee
  alternate:
    - name: 中文
      link: /xyg-wiki/
      lang: zh
    - name: English
      link: /xyg-wiki/en/
      lang: en
